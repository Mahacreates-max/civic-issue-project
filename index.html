<!DOCTYPE html>
<html>
<head>
  <title>Civic Issue Reporting</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: 0.3s;
    }

    .dark {
      background: #121212;
      color: white;
    }

    .container {
      width: 360px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    .dark .container {
      background: #1e1e1e;
    }

    h2 {
      text-align: center;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #ff7e5f;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #ff5a3d;
    }

    .toggle {
      position: absolute;
      top: 10px;
      right: 20px;
      cursor: pointer;
      color: white;
      font-size: 20px;
    }

    iframe {
      width: 100%;
      height: 200px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .success {
      text-align: center;
      color: green;
      display: none;
    }
  </style>
</head>

<body>

<div class="toggle" onclick="toggleDark()">
  <i class="fas fa-moon"></i>
</div>

<div class="container">

  <h2><i class="fas fa-road"></i> Report Issue</h2>

  <form id="reportForm">

    <input type="text" id="name" placeholder="👤 Your Name" required>

    <select id="issue">
      <option>🕳 Pothole</option>
      <option>🗑 Garbage</option>
      <option>💡 Streetlight</option>
    </select>

    <textarea id="desc" placeholder="📝 Description"></textarea>

    <input type="text" id="location" placeholder="📍 Location">

    <button type="button" onclick="getLocation()">
      <i class="fas fa-location-arrow"></i> Auto Detect Location
    </button>

    <input type="file" id="image" accept="image/*" onchange="previewImage()">

    <img id="preview" style="display:none;">

    <iframe id="map"></iframe>

    <button type="submit">
      <i class="fas fa-paper-plane"></i> Submit
    </button>

  </form>

  <div class="success" id="msg">✅ Complaint Submitted!</div>

</div>

<script src="firebase.js"></script>

<script>

// 🌙 Dark mode
function toggleDark(){
  document.body.classList.toggle("dark");
}

// 📍 Auto location + map
function getLocation(){
  navigator.geolocation.getCurrentPosition(function(pos){
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById("location").value = lat + ", " + lon;

    document.getElementById("map").src =
      "https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";
  });
}

// 🖼 Image preview
function previewImage(){
  const file = document.getElementById("image").files[0];
  const reader = new FileReader();

  reader.onload = function(){
    const img = document.getElementById("preview");
    img.src = reader.result;
    img.style.display = "block";
  };

  if(file){
    reader.readAsDataURL(file);
  }
}

// 🚀 Submit + SAVE (FREE image base64)
document.getElementById("reportForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const issue = document.getElementById("issue").value;
  const desc = document.getElementById("desc").value;
  const location = document.getElementById("location").value;

  const file = document.getElementById("image").files[0];

  if(file){
    const reader = new FileReader();

    reader.onload = function(){
      db.ref("issues").push({
        name: name,
        issue: issue,
        desc: desc,
        location: location,
        image: reader.result, // FREE image saving
        status: "Pending"
      });

      document.getElementById("msg").style.display = "block";
    };

    reader.readAsDataURL(file);

  } else {
    db.ref("issues").push({
      name: name,
      issue: issue,
      desc: desc,
      location: location,
      status: "Pending"
    });

    document.getElementById("msg").style.display = "block";
  }

  document.getElementById("reportForm").reset();
  document.getElementById("preview").style.display = "none";
});

</script>

</body>
</html>
